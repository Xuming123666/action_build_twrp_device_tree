name: Generate TWRP Device Tree (recovery-as-boot)

on:
  workflow_dispatch:
    inputs:
      boot_url:
        description: 'boot.img 直链 URL (Android 10)'
        required: true
        type: string
      device_name:
        description: '设备代号'
        required: true
        type: string
      manufacturer:
        description: '厂商名称'
        required: true
        type: string
      api_level:
        description: 'Android API Level (Android 10 填 29)'
        required: false
        default: '29'
        type: string
      is_ab_device:
        description: '是否为 A/B 分区设备'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip cpio file xz-utils wget git
          # 关键：确保 file 命令可用（AIK 依赖它）
          file --version
          pip3 install --upgrade pip
          pip3 install twrpdtgen

      - name: Download boot.img
        run: |
          mkdir -p workspace
          curl -L -o workspace/boot.img "${{ github.event.inputs.boot_url }}"
          file workspace/boot.img
          ls -lh workspace/boot.img

      - name: Download magiskboot (more reliable than AIK)
        run: |
          cd workspace
          # 下载预编译的 magiskboot
          wget -q https://github.com/topjohnwu/Magisk/releases/download/v27.0/Magisk-v27.0.apk -O magisk.zip
          unzip -o magisk.zip -d magisk_extracted || true
          # 尝试从 apk 中提取 magiskboot
          if [ -f "magisk_extracted/lib/arm64-v8a/libmagiskboot.so" ]; then
            cp magisk_extracted/lib/arm64-v8a/libmagiskboot.so magiskboot
            chmod +x magiskboot
          elif [ -f "magisk_extracted/lib/x86_64/libmagiskboot.so" ]; then
            cp magisk_extracted/lib/x86_64/libmagiskboot.so magiskboot
            chmod +x magiskboot
          fi
          
          # 备用方案：直接下载 standalone magiskboot
          if [ ! -f "magiskboot" ]; then
            wget -q https://github.com/pinnacode/magiskboot_build/releases/download/last-ci/magiskboot-x86_64-linux -O magiskboot
            chmod +x magiskboot
          fi
          
          ./magiskboot --version 2>/dev/null || echo "magiskboot downloaded"

      - name: Unpack boot.img with magiskboot and fix prop
        run: |
          cd workspace
          mkdir -p boot_out
          cd boot_out
          
          # 用 magiskboot 解包
          ../magiskboot unpack -h ../boot.img 2>&1 || true
          
          ls -la
          
          # 提取 ramdisk
          if [ -f "ramdisk.cpio" ]; then
            mkdir -p ramdisk
            cd ramdisk
            ../magiskboot cpio ../ramdisk.cpio extract 2>&1 || true
            cd ..
            
            # 补全 prop
            PROP_FILE=""
            if [ -f "ramdisk/prop.default" ]; then
              PROP_FILE="ramdisk/prop.default"
            elif [ -f "ramdisk/default.prop" ]; then
              PROP_FILE="ramdisk/default.prop"
            fi
            
            if [ -n "$PROP_FILE" ]; then
              echo "Found prop file: $PROP_FILE"
              if ! grep -q "ro.product.first_api_level" "$PROP_FILE"; then
                echo "Adding ro.product.first_api_level=${{ github.event.inputs.api_level }}"
                echo "ro.product.first_api_level=${{ github.event.inputs.api_level }}" >> "$PROP_FILE"
              fi
            else
              mkdir -p ramdisk
              echo "ro.product.first_api_level=${{ github.event.inputs.api_level }}" > ramdisk/prop.default
            fi
            
            # 重新打包 ramdisk
            cd ramdisk
            find . | cpio -o -H newc > ../ramdisk_new.cpio
            cd ..
            mv ramdisk_new.cpio ramdisk.cpio
            
            # 重新打包 boot.img
            ../magiskboot repack ../boot.img boot_fixed.img 2>&1 || true
            
            if [ -f "boot_fixed.img" ]; then
              cp boot_fixed.img ../boot_fixed.img
            fi
          fi
          
          cd ..
          ls -lh boot_fixed.img 2>/dev/null || cp boot.img boot_fixed.img

      - name: Setup AIK for twrpdtgen (fix built-in AIK)
        run: |
          cd workspace
          # twrpdtgen 3.0.0 使用 sebaubuntu_libs/libaik，它会自动克隆 AIK
          # 我们预先克隆一个可用的 AIK 到它期望的位置
          # 先找到 libaik 的 AIK 目录
          python3 -c "
          import sebaubuntu_libs.libaik as libaik
          import inspect
          import os
          aik_path = os.path.dirname(inspect.getfile(libaik))
          print(f'libaik path: {aik_path}')
          " > aik_path.txt 2>/dev/null || true
          
          # 或者直接在用户目录下创建 AIK（twrpdtgen 可能在这里查找）
          mkdir -p ~/.local/share/sebaubuntu_libs/libaik
          if [ ! -d ~/.local/share/sebaubuntu_libs/libaik/AIK-Linux-mirror ]; then
            git clone --depth=1 https://github.com/SebaUbuntu/AIK-Linux-mirror.git ~/.local/share/sebaubuntu_libs/libaik/AIK-Linux-mirror || true
          fi
          
          # 确保 AIK 脚本可执行
          if [ -d ~/.local/share/sebaubuntu_libs/libaik/AIK-Linux-mirror ]; then
            chmod +x ~/.local/share/sebaubuntu_libs/libaik/AIK-Linux-mirror/*.sh
          fi

      - name: Generate device tree with twrpdtgen 3.0.0
        run: |
          mkdir -p output
          # 尝试用修复后的 boot.img
          python3 -m twrpdtgen \
            -o output/${{ github.event.inputs.manufacturer }}/${{ github.event.inputs.device_name }} \
            workspace/boot_fixed.img 2>&1 || \
          # 如果失败，尝试原始 boot.img
          python3 -m twrpdtgen \
            -o output/${{ github.event.inputs.manufacturer }}/${{ github.event.inputs.device_name }} \
            workspace/boot.img 2>&1 || \
          # 如果还是失败，使用 Python 脚本手动调用 DeviceTree 并传入已解包的信息
          echo "twrpdtgen failed, will try manual generation"

      - name: Manual device tree generation fallback
        if: failure()
        run: |
          cd workspace
          # 如果 twrpdtgen 完全失败，我们用 magiskboot 提取的信息手动生成基础设备树
          mkdir -p output/${{ github.event.inputs.manufacturer }}/${{ github.event.inputs.device_name }}
          DEVICE_PATH="output/${{ github.event.inputs.manufacturer }}/${{ github.event.inputs.device_name }}"
          
          # 读取 magiskboot 解包的信息
          KERNEL=""
          if [ -f "boot_out/kernel" ]; then
            KERNEL="kernel"
          fi
          
          # 创建基础 BoardConfig.mk
          cat > $DEVICE_PATH/BoardConfig.mk << EOF
          DEVICE_PATH := device/${{ github.event.inputs.manufacturer }}/${{ github.event.inputs.device_name }}
          
          # For building with minimal manifest
          ALLOW_MISSING_DEPENDENCIES := true
          
          # Architecture
          TARGET_ARCH := arm64
          TARGET_ARCH_VARIANT := armv8-a
          TARGET_CPU_ABI := arm64-v8a
          TARGET_CPU_ABI2 :=
          TARGET_CPU_VARIANT := generic
          
          # Assert
          TARGET_OTA_ASSERT_DEVICE := ${{ github.event.inputs.device_name }}
          
          # File systems
          BOARD_HAS_LARGE_FILESYSTEM := true
          BOARD_SYSTEMIMAGE_PARTITION_TYPE := ext4
          BOARD_USERDATAIMAGE_FILE_SYSTEM_TYPE := ext4
          TARGET_USERIMAGES_USE_EXT4 := true
          TARGET_USERIMAGES_USE_F2FS := true
          
          # Kernel
          TARGET_PREBUILT_KERNEL := \$(DEVICE_PATH)/prebuilt/kernel
          BOARD_KERNEL_CMDLINE := androidboot.hardware=qcom
          BOARD_KERNEL_BASE := 0x80000000
          BOARD_KERNEL_PAGESIZE := 2048
          
          # recovery-as-boot
          BOARD_USES_RECOVERY_AS_BOOT := true
          EOF
          
          if [ "${{ github.event.inputs.is_ab_device }}" = "true" ]; then
            cat >> $DEVICE_PATH/BoardConfig.mk << EOF
          AB_OTA_UPDATER := true
          AB_OTA_PARTITIONS += boot
          EOF
          fi
          
          # 复制 kernel
          mkdir -p $DEVICE_PATH/prebuilt
          if [ -f "boot_out/kernel" ]; then
            cp boot_out/kernel $DEVICE_PATH/prebuilt/kernel
          fi
          
          # 创建 Android.mk
          cat > $DEVICE_PATH/Android.mk << EOF
          LOCAL_PATH := \$(call my-dir)
          
          ifeq (\$(TARGET_DEVICE),${{ github.event.inputs.device_name }})
          include \$(call all-subdir-makefiles,\$(LOCAL_PATH))
          endif
          EOF
          
          # 创建 AndroidProducts.mk
          cat > $DEVICE_PATH/AndroidProducts.mk << EOF
          PRODUCT_MAKEFILES := \\
              \$(LOCAL_DIR)/twrp_${{ github.event.inputs.device_name }}.mk
          EOF
          
          # 创建 device.mk
          cat > $DEVICE_PATH/device.mk << EOF
          LOCAL_PATH := device/${{ github.event.inputs.manufacturer }}/${{ github.event.inputs.device_name }}
          EOF
          
          # 创建 twrp_*.mk
          cat > $DEVICE_PATH/twrp_${{ github.event.inputs.device_name }}.mk << EOF
          \$(call inherit-product, \$(SRC_TARGET_DIR)/product/core_minimal.mk)
          
          # Inherit from device
          \$(call inherit-product, device/${{ github.event.inputs.manufacturer }}/${{ github.event.inputs.device_name }}/device.mk)
          
          # Inherit some common TWRP stuff.
          \$(call inherit-product, vendor/twrp/config/common.mk)
          
          # Device identifier
          PRODUCT_DEVICE := ${{ github.event.inputs.device_name }}
          PRODUCT_NAME := twrp_${{ github.event.inputs.device_name }}
          PRODUCT_BRAND := ${{ github.event.inputs.manufacturer }}
          PRODUCT_MODEL := ${{ github.event.inputs.device_name }}
          PRODUCT_MANUFACTURER := ${{ github.event.inputs.manufacturer }}
          EOF
          
          # 创建 recovery.fstab
          cat > $DEVICE_PATH/recovery.fstab << EOF
          # mount point    fstype    device                                  flags
          /boot            emmc      /dev/block/bootdevice/by-name/boot      flags=backup=1;flashimg=1
          /data            ext4      /dev/block/bootdevice/by-name/userdata    flags=backup=1;wipeingui;canbewiped
          /system          ext4      /dev/block/bootdevice/by-name/system      flags=backup=1;wipeingui
          /vendor          ext4      /dev/block/bootdevice/by-name/vendor      flags=backup=1;wipeingui
          /cache           ext4      /dev/block/bootdevice/by-name/cache       flags=backup=1;wipeingui
          /sdcard          vfat      /dev/block/mmcblk1p1                      flags=backup=1;removable
          EOF

      - name: Add recovery-as-boot configuration
        run: |
          DEVICE_PATH="output/${{ github.event.inputs.manufacturer }}/${{ github.event.inputs.device_name }}"
          BOARDCONFIG="$DEVICE_PATH/BoardConfig.mk"
          
          if [ -f "$BOARDCONFIG" ]; then
            cp "$BOARDCONFIG" "${BOARDCONFIG}.bak"
            
            cat >> "$BOARDCONFIG" << EOF
            
          # === recovery-as-boot Configuration ===
          BOARD_USES_RECOVERY_AS_BOOT := true
          EOF
            
            if [ "${{ github.event.inputs.is_ab_device }}" = "true" ]; then
              cat >> "$BOARDCONFIG" << EOF
          AB_OTA_UPDATER := true
          AB_OTA_PARTITIONS += boot
          EOF
            fi
          fi

      - name: Create adaptation guide
        run: |
          cat > output/RECOVERY_AS_BOOT_GUIDE.md << EOF
          # Recovery-as-Boot 编译指南
          
          ## 设备信息
          - 厂商: ${{ github.event.inputs.manufacturer }}
          - 设备: ${{ github.event.inputs.device_name }}
          - A/B 设备: ${{ github.event.inputs.is_ab_device }}
          
          ## TWRP 11 源码初始化
          \`\`\`bash
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-11
          repo sync -c -j\$(nproc --all)
          \`\`\`
          
          ## 编译
          \`\`\`bash
          source build/envsetup.sh
          lunch twrp_${{ github.event.inputs.device_name }}-eng
          mka bootimage
          \`\`\`
          
          ## 刷入
          \`\`\`bash
          fastboot boot out/target/product/${{ github.event.inputs.device_name }}/boot.img
          \`\`\`
          EOF

      - name: Package and upload
        run: |
          cd output
          zip -r ../${{ github.event.inputs.manufacturer }}_${{ github.event.inputs.device_name }}_recovery_as_boot.zip . || true
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: recovery-as-boot-${{ github.event.inputs.manufacturer }}-${{ github.event.inputs.device_name }}-${{ github.run_number }}
          name: "Recovery-as-Boot Device Tree - ${{ github.event.inputs.manufacturer }} ${{ github.event.inputs.device_name }}"
          body: |
            为 recovery-as-boot 模式生成的 TWRP 设备树
            
            - 厂商: ${{ github.event.inputs.manufacturer }}
            - 设备: ${{ github.event.inputs.device_name }}
            - A/B 设备: ${{ github.event.inputs.is_ab_device }}
            - 来源: ${{ github.event.inputs.boot_url }}
          files: |
            ${{ github.event.inputs.manufacturer }}_${{ github.event.inputs.device_name }}_recovery_as_boot.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
