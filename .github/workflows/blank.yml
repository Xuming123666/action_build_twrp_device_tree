name: Make TWRP Device
on:
  workflow_dispatch:
    inputs:
      IMG_URL:    
        description: 'IMG_URL'
        required: true
        default: ''
jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-24.04
    steps:
    - name: Check Out
      uses: actions/checkout@main
    - name: Prepare the environment
      run: |
        sudo apt update
        sudo apt -y install python3 python3-pip cpio wget git lz4 brotli zstd libarchive-tools
        # 安装最新版twrpdtgen（3.1.0+），修复AIK解包问题
        pip3 install --break-system-packages git+https://github.com/twrpdtgen/twrpdtgen.git
        # 手动克隆最新版AIK，覆盖内置旧版本
        git clone https://github.com/osm0sis/Android-Image-Kitchen.git ~/AIK
        mkdir dt
      
    - name: Download boot or recovery img
      run: |
        wget -O boot.img "${{ github.event.inputs.IMG_URL }}"
        ls -lh
      
    - name: Start build
      run: |
        # 使用系统最新AIK而不是内置旧版本
        python3 -m twrpdtgen -o dt/ --aik-path ~/AIK boot.img
    - name: ZIP device tree
      run: |
        zip -r DeviceTree.zip ./dt
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./DeviceTree.zip
        name: TWRP_Device_Tree-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: DeviceTree for twrp
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
