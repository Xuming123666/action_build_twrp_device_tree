name: Make TWRP Device (Android 10)
on:
  workflow_dispatch:
    inputs:
      IMG_URL:    
        description: 'IMG_URL'
        required: true
        default: ''
jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-24.04
    steps:
    - name: Check Out
      uses: actions/checkout@main
    - name: Prepare the environment
      run: |
        sudo apt update
        sudo apt -y install python3 python3-pip cpio wget lz4
        # 彻底卸载所有版本，强制安装PyPI上存在的2.1.0稳定版
        pip3 uninstall -y twrpdtgen sebaubuntu-libs
        pip3 install --break-system-packages --no-cache-dir twrpdtgen==2.1.0
        mkdir dt
      
    - name: Download boot or recovery img
      run: |
        wget -O boot.img "${{ github.event.inputs.IMG_URL }}"
        ls -lh
      
    - name: Start build (Android 10专用)
      run: |
        python3 -m twrpdtgen -o dt/ boot.img
    - name: ZIP device tree
      run: |
        zip -r DeviceTree.zip ./dt
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./DeviceTree.zip
        name: TWRP_Device_Tree-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: Android 10 TWRP Device Tree
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
